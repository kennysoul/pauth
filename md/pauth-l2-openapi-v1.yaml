openapi: 3.1.0
info:
  title: pauth API
  version: 1.0.0
  description: |
    OpenAPI specification for the implemented pauth authentication model.

    - L1: gateway forward-auth (`GET /api/verify`)
    - OAuth: app login (`/api/l2/authorize`, `/api/l2/token`, `/api/l2/userinfo`)
    - Admin: clients, users, L1 permissions, invites, backup, integration (`/api/admin/*`)

    All active pauth users may OAuth into registered clients. Per-app authorization is managed by each application.

    OAuth `redirect_uri`: any valid HTTPS URL (localhost HTTP for dev). No per-client URI registration.

servers:
  - url: https://auth.example.com
    description: Production

tags:
  - name: System
  - name: L1
  - name: OAuth
  - name: Admin

paths:
  /api/system/state:
    get:
      tags: [System]
      summary: System state and canonical origin
      responses:
        "200":
          description: State
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemState"

  /api/verify:
    get:
      tags: [L1]
      summary: L1 gateway verification
      description: |
        Requires active session and L1 grant (`user_l1_access.enabled`).
        Returns 200 with identity headers, or 302 to login.
      parameters:
        - in: header
          name: X-Forwarded-Proto
          schema: { type: string }
        - in: header
          name: X-Forwarded-Host
          schema: { type: string }
        - in: header
          name: X-Forwarded-Uri
          schema: { type: string }
      security:
        - cookieSid: []
      responses:
        "200":
          description: L1 success
          headers:
            X-Auth-User-Id:
              schema: { type: string }
            X-Auth-User-Email:
              schema: { type: string }
            X-Auth-User-Name:
              schema: { type: string }
            X-Auth-User-Role:
              schema: { type: string }
        "302":
          description: Redirect to login

  /api/l2/authorize:
    get:
      tags: [OAuth]
      summary: OAuth authorization (browser redirect)
      description: |
        On success, redirects to `redirect_uri?code=...&state=...`.
        `redirect_uri` must be HTTPS (or localhost HTTP for dev).
      parameters:
        - in: query
          name: client_id
          required: true
          schema: { type: string }
        - in: query
          name: redirect_uri
          required: true
          schema: { type: string, format: uri }
        - in: query
          name: response_type
          required: true
          schema: { type: string, enum: [code] }
        - in: query
          name: scope
          schema: { type: string, default: "openid profile" }
        - in: query
          name: state
          required: true
          schema: { type: string }
        - in: query
          name: nonce
          schema: { type: string }
      responses:
        "302":
          description: Callback redirect (success or access_denied)
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_redirect_uri:
                  value:
                    error: invalid_redirect_uri
                    message: redirect_uri must be a valid HTTPS URL

  /api/l2/token:
    post:
      tags: [OAuth]
      summary: Exchange authorization code for token
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/l2/userinfo:
    get:
      tags: [OAuth]
      summary: User profile from Bearer token
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/config:
    get:
      tags: [Admin]
      summary: Get system config
      security:
        - cookieSid: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfig"
    patch:
      tags: [Admin]
      summary: Update registration toggle
      description: Open-registration toggle is also exposed in the Users admin UI.
      security:
        - cookieSid: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchSystemConfigRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/admin/clients:
    get:
      tags: [Admin]
      summary: List OAuth clients
      security:
        - cookieSid: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      tags: [Admin]
      summary: Create OAuth client (auto-generates clientSecret)
      security:
        - cookieSid: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClientResponse"

  /api/admin/clients/{clientId}:
    patch:
      tags: [Admin]
      summary: Update client
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
    delete:
      tags: [Admin]
      summary: Delete client
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/admin/clients/{clientId}/regenerate-secret:
    post:
      tags: [Admin]
      summary: Regenerate client secret
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateSecretResponse"

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List users with L1 flag
      security:
        - cookieSid: []
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, active, disabled, all] }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /api/admin/users/{userId}:
    patch:
      tags: [Admin]
      summary: Update user name or status
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
    delete:
      tags: [Admin]
      summary: Delete user
      description: Cannot delete self, root bootstrap admin, or last active admin.
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/admin/backup/export:
    post:
      tags: [Admin]
      summary: Export password-encrypted backup (excludes root admin)
      security:
        - cookieSid: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupPasswordRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupExportResponse"

  /api/admin/backup/preview:
    post:
      tags: [Admin]
      summary: Preview backup import
      security:
        - cookieSid: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupImportRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupPreviewResponse"

  /api/admin/backup/import:
    post:
      tags: [Admin]
      summary: Import backup (replaces non-root data)
      security:
        - cookieSid: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupImportRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/admin/integration/google:
    get:
      tags: [Admin]
      summary: Get Google OAuth integration config
      security:
        - cookieSid: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleIntegrationConfig"
    post:
      tags: [Admin]
      summary: Save Google OAuth integration config
      security:
        - cookieSid: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleIntegrationConfig"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/admin/integration/microsoft:
    get:
      tags: [Admin]
      summary: Get Microsoft OAuth integration config
      security:
        - cookieSid: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MicrosoftIntegrationConfig"
    post:
      tags: [Admin]
      summary: Save Microsoft OAuth integration config
      security:
        - cookieSid: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MicrosoftIntegrationConfig"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/admin/system/reset:
    post:
      tags: [Admin]
      summary: Factory reset (returns system to NEEDS_SETUP)
      security:
        - cookieSid: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemResetRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/admin/users/{userId}/permissions:
    put:
      tags: [Admin]
      summary: Set user L1 gateway access
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPermissionsRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetPermissionsResponse"

  /api/admin/invites:
    post:
      tags: [Admin]
      summary: Create pre-provisioned user and invite URL
      security:
        - cookieSid: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInviteResponse"

components:
  securitySchemes:
    cookieSid:
      type: apiKey
      in: cookie
      name: sid
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error: { type: string }
        message: { type: string }

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, const: true }

    SystemState:
      type: object
      required: [state, registrationEnabled, origin]
      properties:
        state: { type: string, enum: [NEEDS_SETUP, ACTIVE] }
        registrationEnabled: { type: boolean }
        origin: { type: string, format: uri }

    AccessMode:
      type: string
      enum: [L2_ONLY, L1_AND_L2]

    UserInfo:
      type: object
      required: [sub, email, name]
      properties:
        sub: { type: string, description: Stable pauth user ID }
        email: { type: string }
        name: { type: string }

    TokenRequest:
      type: object
      required: [grant_type, code, client_id, client_secret, redirect_uri]
      properties:
        grant_type: { type: string, enum: [authorization_code] }
        code: { type: string }
        client_id: { type: string }
        client_secret: { type: string }
        redirect_uri: { type: string, format: uri }

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in, scope, user]
      properties:
        access_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, example: 600 }
        scope: { type: string }
        id_token: { type: string, nullable: true }
        user:
          $ref: "#/components/schemas/UserInfo"

    Client:
      type: object
      required: [id, clientId, name, accessMode, enabled, redirectUris, clientSecret]
      properties:
        id: { type: string }
        clientId: { type: string }
        name: { type: string }
        accessMode:
          $ref: "#/components/schemas/AccessMode"
        enabled: { type: boolean }
        redirectUris:
          type: array
          items: { type: string }
          description: Legacy field, always empty array
        clientSecret:
          type: string
          nullable: true
          description: Plaintext secret for admin; null if not yet generated
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateClientRequest:
      type: object
      required: [clientId, name, accessMode]
      properties:
        clientId: { type: string }
        name: { type: string }
        accessMode:
          $ref: "#/components/schemas/AccessMode"
        enabled: { type: boolean, default: true }

    CreateClientResponse:
      type: object
      required: [ok, id, clientId, clientSecret]
      properties:
        ok: { type: boolean, const: true }
        id: { type: string }
        clientId: { type: string }
        clientSecret: { type: string }

    UpdateClientRequest:
      type: object
      properties:
        name: { type: string }
        accessMode:
          $ref: "#/components/schemas/AccessMode"
        enabled: { type: boolean }

    RegenerateSecretResponse:
      type: object
      required: [ok, clientId, clientSecret]
      properties:
        ok: { type: boolean, const: true }
        clientId: { type: string }
        clientSecret: { type: string }

    AdminUser:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        role: { type: string }
        status: { type: string }
        passkeyCount: { type: integer }
        hasPendingInvite: { type: boolean }
        l1Enabled: { type: boolean }
        isRoot:
          type: boolean
          description: True for bootstrap admin (name root); cannot rename/disable/delete
        googleEnabled: { type: boolean }
        googleLinked: { type: boolean }
        microsoftEnabled: { type: boolean }
        microsoftLinked: { type: boolean }
        hasPasskey: { type: boolean }

    SystemConfig:
      type: object
      required: [registrationEnabled]
      properties:
        registrationEnabled: { type: boolean }

    PatchSystemConfigRequest:
      type: object
      properties:
        registrationEnabled: { type: boolean }

    BackupPasswordRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 8

    BackupImportRequest:
      type: object
      required: [password, bundle]
      properties:
        password:
          type: string
          minLength: 8
        bundle:
          type: string
          description: Encrypted backup file contents (pauth-backup-encrypted-v1)

    BackupPreview:
      type: object
      properties:
        users: { type: integer }
        passkeys: { type: integer }
        clients: { type: integer }
        oauthIdentities: { type: integer }
        settings: { type: integer }
        invites: { type: integer }
        l1Grants: { type: integer }
        exportedAt: { type: string, format: date-time }
        registrationEnabled: { type: boolean }

    BackupExportResponse:
      type: object
      required: [ok, filename, bundle, preview]
      properties:
        ok: { type: boolean, const: true }
        filename: { type: string }
        bundle: { type: string }
        preview:
          $ref: "#/components/schemas/BackupPreview"

    BackupPreviewResponse:
      type: object
      required: [preview]
      properties:
        preview:
          $ref: "#/components/schemas/BackupPreview"

    GoogleIntegrationConfig:
      type: object
      properties:
        enabled: { type: boolean }
        clientId: { type: string }
        redirectUri: { type: string, format: uri }
        scopes: { type: string }
        clientSecretSet:
          type: boolean
          description: True if a client secret is stored (secret never returned)

    MicrosoftIntegrationConfig:
      type: object
      properties:
        enabled: { type: boolean }
        tenantId: { type: string }
        clientId: { type: string }
        redirectUri: { type: string, format: uri }
        scopes: { type: string }
        clientSecretSet:
          type: boolean
          description: True if a client secret is stored (secret never returned)

    SystemResetRequest:
      type: object
      required: [confirmation]
      properties:
        confirmation:
          type: string
          enum: [RESET_ALL_I_UNDERSTAND]

    UpdateUserRequest:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [active, disabled] }

    SetPermissionsRequest:
      type: object
      required: [l1Enabled]
      properties:
        l1Enabled: { type: boolean }

    SetPermissionsResponse:
      type: object
      required: [ok, permissions]
      properties:
        ok: { type: boolean, const: true }
        permissions:
          type: object
          properties:
            l1Enabled: { type: boolean }

    CreateInviteRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        role: { type: string, enum: [admin, user], default: user }
        l1Enabled: { type: boolean, default: false }

    CreateInviteResponse:
      type: object
      required: [ok, url, token, expiresAt, userId]
      properties:
        ok: { type: boolean, const: true }
        url: { type: string, format: uri }
        token: { type: string }
        expiresAt: { type: string, format: date-time }
        userId: { type: string }
