openapi: 3.1.0
info:
  title: pauth L1/L2 API
  version: 1.0.0-draft
  description: |
    Draft OpenAPI specification for pauth L1/L2 model.

    - L1: gateway/browser pass-through check (`/api/verify`)
    - L2: app login and identity (`/api/l2/authorize`, `/api/l2/token`, `/api/l2/userinfo`)
    - Admin: client and grant management (`/api/admin/*`)

servers:
  - url: https://auth.example.com
    description: Production

tags:
  - name: L1
  - name: L2
  - name: Admin

paths:
  /api/verify:
    get:
      tags: [L1]
      summary: L1 gateway verification
      description: |
        Forward-auth endpoint for Caddy/Nginx.
        Returns `200` with identity headers when L1 passes, or `302` redirect to login otherwise.
      parameters:
        - in: header
          name: X-Forwarded-Proto
          schema: { type: string }
        - in: header
          name: X-Forwarded-Host
          schema: { type: string }
        - in: header
          name: X-Forwarded-Uri
          schema: { type: string }
      security:
        - cookieSid: []
      responses:
        "200":
          description: L1 verification success
          headers:
            X-Auth-User-Id:
              schema: { type: string }
            X-Auth-User-Email:
              schema: { type: string, format: email }
            X-Auth-User-Name:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: "null"
              example: null
        "302":
          description: Redirect to login
          headers:
            Location:
              schema: { type: string, format: uri }

  /api/l2/authorize:
    get:
      tags: [L2]
      summary: Authorize user for L2 client
      description: |
        Browser redirect endpoint for L2 authorization code flow.
        On success, redirects to `redirect_uri` with `code` and `state`.
      parameters:
        - in: query
          name: client_id
          required: true
          schema: { type: string }
        - in: query
          name: redirect_uri
          required: true
          schema: { type: string, format: uri }
        - in: query
          name: response_type
          required: true
          schema:
            type: string
            enum: [code]
        - in: query
          name: scope
          required: false
          schema:
            type: string
            default: openid profile
        - in: query
          name: state
          required: true
          schema: { type: string }
        - in: query
          name: nonce
          required: false
          schema: { type: string }
      security:
        - cookieSid: []
      responses:
        "302":
          description: Redirect back to app callback (success or access_denied)
          headers:
            Location:
              schema: { type: string, format: uri }
        "400":
          description: Invalid request/client/redirect URI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_client:
                  value:
                    error: invalid_client
                    message: Unknown or disabled client_id
                invalid_redirect_uri:
                  value:
                    error: invalid_redirect_uri
                    message: redirect_uri is not allowed for this client
                invalid_request:
                  value:
                    error: invalid_request
                    message: state is required

  /api/l2/token:
    post:
      tags: [L2]
      summary: Exchange code for L2 token
      description: |
        Backend endpoint for authorization code exchange.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Token exchange success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
              example:
                access_token: at_01JATOKEN
                token_type: Bearer
                expires_in: 600
                scope: openid profile
                id_token: id_opaque_or_jwt
                user:
                  sub: usr_01JABCDEF
                  email: user@example.com
                  name: Kenny
        "400":
          description: Invalid token request or grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unsupported_grant_type:
                  value:
                    error: unsupported_grant_type
                    message: Only authorization_code is supported
                invalid_grant:
                  value:
                    error: invalid_grant
                    message: Authorization code is invalid
                redirect_uri_mismatch:
                  value:
                    error: invalid_grant
                    message: redirect_uri mismatch
        "401":
          description: Client authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: invalid_client
                message: Client authentication failed
        "403":
          description: User no longer authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: access_denied
                message: User no longer has required client or L1 access

  /api/l2/userinfo:
    get:
      tags: [L2]
      summary: Get user profile from access token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
              example:
                sub: usr_01JABCDEF
                email: user@example.com
                name: Kenny
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing:
                  value:
                    error: invalid_token
                    message: Bearer token is required
                expired_or_revoked:
                  value:
                    error: invalid_token
                    message: Token is expired or revoked

  /api/admin/clients:
    get:
      tags: [Admin]
      summary: List clients
      security:
        - cookieSid: []
      responses:
        "200":
          description: Client list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      tags: [Admin]
      summary: Create client
      security:
        - cookieSid: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClientResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: client_id conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/clients/{clientId}:
    patch:
      tags: [Admin]
      summary: Update client
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/users/{userId}/l1-access:
    put:
      tags: [Admin]
      summary: Set user L1 access
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetL1AccessRequest"
      responses:
        "200":
          description: Updated L1 grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetL1AccessResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/users/{userId}/client-access:
    get:
      tags: [Admin]
      summary: List user client grants
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User client grant list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserClientGrantListResponse"

  /api/admin/users/{userId}/client-access/{clientId}:
    put:
      tags: [Admin]
      summary: Upsert user grant for a client
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetUserClientGrantRequest"
      responses:
        "200":
          description: Updated grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetUserClientGrantResponse"
        "404":
          description: User or client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Admin]
      summary: Revoke user grant for a client
      security:
        - cookieSid: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
        - in: path
          name: clientId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

components:
  securitySchemes:
    cookieSid:
      type: apiKey
      in: cookie
      name: sid
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error, message]
      properties:
        error:
          type: string
          examples:
            - invalid_request
            - invalid_client
            - invalid_grant
            - invalid_token
            - access_denied
            - not_found
            - conflict
        message:
          type: string

    OkResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true

    AccessMode:
      type: string
      enum: [L2_ONLY, L1_AND_L2]

    UserInfo:
      type: object
      additionalProperties: false
      required: [sub, email, name]
      properties:
        sub:
          type: string
          description: pauth stable user ID
        email:
          type: string
          format: email
        name:
          type: string

    TokenRequest:
      type: object
      additionalProperties: false
      required: [grant_type, code, client_id, client_secret, redirect_uri]
      properties:
        grant_type:
          type: string
          enum: [authorization_code]
        code:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        redirect_uri:
          type: string
          format: uri

    TokenResponse:
      type: object
      additionalProperties: false
      required: [access_token, token_type, expires_in, scope, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          minimum: 1
        scope:
          type: string
        id_token:
          type: string
          nullable: true
        user:
          $ref: "#/components/schemas/UserInfo"

    Client:
      type: object
      additionalProperties: false
      required: [clientId, name, accessMode, enabled, redirectUris]
      properties:
        clientId:
          type: string
        name:
          type: string
        accessMode:
          $ref: "#/components/schemas/AccessMode"
        enabled:
          type: boolean
        redirectUris:
          type: array
          minItems: 1
          items:
            type: string
            format: uri

    CreateClientRequest:
      type: object
      additionalProperties: false
      required: [clientId, name, accessMode, redirectUris, enabled]
      properties:
        clientId:
          type: string
        name:
          type: string
        accessMode:
          $ref: "#/components/schemas/AccessMode"
        redirectUris:
          type: array
          minItems: 1
          items:
            type: string
            format: uri
        enabled:
          type: boolean

    CreateClientResponse:
      type: object
      additionalProperties: false
      required: [ok, client]
      properties:
        ok:
          type: boolean
          const: true
        client:
          $ref: "#/components/schemas/Client"

    UpdateClientRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        accessMode:
          $ref: "#/components/schemas/AccessMode"
        redirectUris:
          type: array
          minItems: 1
          items:
            type: string
            format: uri
        enabled:
          type: boolean
      minProperties: 1

    SetL1AccessRequest:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          type: boolean

    SetL1AccessResponse:
      type: object
      additionalProperties: false
      required: [ok, userId, l1Access]
      properties:
        ok:
          type: boolean
          const: true
        userId:
          type: string
        l1Access:
          type: object
          additionalProperties: false
          required: [enabled]
          properties:
            enabled:
              type: boolean

    SetUserClientGrantRequest:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          type: boolean
        appRole:
          type: string
          nullable: true

    SetUserClientGrantResponse:
      type: object
      additionalProperties: false
      required: [ok, userId, clientId, grant]
      properties:
        ok:
          type: boolean
          const: true
        userId:
          type: string
        clientId:
          type: string
        grant:
          type: object
          additionalProperties: false
          required: [enabled]
          properties:
            enabled:
              type: boolean
            appRole:
              type: string
              nullable: true

    UserClientGrant:
      type: object
      additionalProperties: false
      required: [clientId, enabled]
      properties:
        clientId:
          type: string
        enabled:
          type: boolean
        appRole:
          type: string
          nullable: true

    UserClientGrantListResponse:
      type: object
      additionalProperties: false
      required: [userId, grants]
      properties:
        userId:
          type: string
        grants:
          type: array
          items:
            $ref: "#/components/schemas/UserClientGrant"
